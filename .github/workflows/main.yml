name: quality gate check
on:
    push:
        branches:
            - main

jobs:
    ci-jobs:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v2
            - name: installing dependencies
              run: pip install -r requirements.txt
            - name: run test and enforce coverage
              run: 
                pytest --cov=calc --cov-report=term
    cd-jobs:
        runs-on: ubuntu-latest
        needs: ci-jobs
        steps:
            - name: checkout code
              uses: actions/checkout@v2
            - name: print meesage
              run: echo 'deployment done...'