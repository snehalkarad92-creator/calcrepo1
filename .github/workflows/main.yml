name: quality gate check

on:
  push:
    branches:
      - main

jobs:
  ci-jobs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage (Quality Gate)
        run: pytest --cov=calc --cov-report=term --cov-fail-under=80

  cd-jobs:
    runs-on: ubuntu-latest
    needs: ci-jobs

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deployment message
        run: echo "Deployment done successfully 🚀"